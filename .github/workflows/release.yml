name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore PicScreenSaver.sln

      - name: Build
        run: dotnet build PicScreenSaver.sln -c Release --no-restore

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          echo "VERSION=$tag" >> $env:GITHUB_OUTPUT

      - name: Package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $outputDir = "release"
          New-Item -ItemType Directory -Path $outputDir -Force

          Copy-Item "PicScreenSaver.Maker/bin/Release/net48/PicScreenSaver v1.0.exe" -Destination "$outputDir/PicScreenSaver-${version}.exe"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            release/*.exe
