name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build Release
        run: dotnet build -c Release --no-restore

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create Release & upload exe
        uses: softprops/action-gh-release@v2
        with:
          name: PicScreenSaver v${{ steps.version.outputs.VERSION }}
          body: |
            PicScreenSaver v${{ steps.version.outputs.VERSION }}
          files: |
            PicScreenSaver.Maker/bin/Release/net48/PicScreenSaver v${{ steps.version.outputs.VERSION }}.exe
