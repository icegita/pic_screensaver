name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v6

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Restore
        run: msbuild PicScreenSaver.sln -t:Restore

      - name: Build
        run: msbuild PicScreenSaver.sln -p:Configuration=Release

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          echo "VERSION=$tag" >> $env:GITHUB_OUTPUT

      - name: Package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $outputDir = "release"
          New-Item -ItemType Directory -Path $outputDir -Force

          $exe = Get-ChildItem "PicScreenSaver.Maker/bin/Release/net48/*.exe" | Select-Object -First 1
          Copy-Item $exe.FullName -Destination "$outputDir/PicScreenSaver-${version}.exe"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            release/*.exe
